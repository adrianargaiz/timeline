<main class="shell">
  <nav class="timeline" aria-label="Epocas de la antiguedad">
    @for (epoch of epochs; track epoch.id; let index = $index) {
      <button
        type="button"
        class="timeline__item"
        [ngClass]="{ 'timeline__item--active': index === activeIndex() }"
        [style.--accent]="epoch.accent"
        (click)="selectEpoch(index)"
      >
        <span class="timeline__title">
          {{ epoch.title }}
          <span class="timeline__date">{{ epoch.years }}</span>
        </span>
      </button>
    }
  </nav>

  <section
    #panoramaHost
    class="panorama"
    [style.--accent]="activeEpoch().accent"
    [ngClass]="{ 'panorama--dragging': isDragging() }"
    (pointerdown)="startDrag($event)"
    (pointermove)="drag($event)"
    (pointerup)="endDrag($event)"
    (pointercancel)="endDrag($event)"
    aria-label="Escenario 360"
  >
    <canvas #panoramaCanvas class="panorama__canvas" aria-hidden="true"></canvas>

    <article class="epoch">
      <h1>{{ activeEpoch().city }}</h1>
      <p>{{ activeEpoch().site }} · {{ activeEpoch().years }}</p>
    </article>
  </section>
</main>
